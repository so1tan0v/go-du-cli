name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grant write permissions for creating/updating releases and uploading assets

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Restore cached Primes
      id: cache-primes-restore
      uses: actions/cache/restore@v4
      with:
        path: |
          bin/
        key: ${{ runner.os }}-primes

    - name: Build
      run: make multios-build

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          Automatic release generated by GitHub Actions.
          Changelog can go here.
        draft: false
        prerelease: false
        files: |
          bin/so1-du-linux-amd64
          bin/so1-du-darwin-amd64
          bin/so1-du-windows-amd64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
